[user]
name = "Chance Addis"
email = "chance.h.addis@proton.me"

[aliases]
l = ["log", "-r", "::@"]        # log ancestors of the working copy
lr = ["log", "-r", "'trunk()'"] # log the remote branch

[template-aliases]
'prompt' = '''separate(" ",
    change_id.shortest(4),
    bookmarks,
    concat(
      if(conflict, "!"),
      if(divergent, "~"),
      if(hidden, "_"),
      if(immutable, "="),
    ),
    raw_escape_sequence("\x1b[1;32m") ++ if(empty, "(empty)"),
    raw_escape_sequence("\x1b[1;32m") ++ truncate_end(29, description.first_line(), "…") ++ raw_escape_sequence("\x1b[0m"),
  )'''


[ui]
editor = "hx"
default-command = "log"
diff-editor = ":builtin"

[fix.tools.rustfmt]
command = ["rustfmt", "--emit", "stdout"]
patterns = ["glob:'**/*.rs'"]
