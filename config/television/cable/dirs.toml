[metadata]
name = "dirs"
description = "A channel to select from directories"
requirements = ["fd", "eza"]

[source]
command = ["fd -t=d", "fd -t=d -H"]
# command = ["fd -t=d -H"]

[preview]
# command = "eza -la --color=always '{}'"
command = "eza -laT -L=2 --color=always '{}'"

[keybindings]
shortcut = "f2"
