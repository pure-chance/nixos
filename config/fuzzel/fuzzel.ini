# ── Fuzzel launcher ────────────────────────────────────────────────────────────
# Mellow palette throughout; JetBrains Mono NF to match Ghostty/Zed.

[main]
font=JetBrainsMono Nerd Font:size=13
dpi-aware=auto
prompt=
terminal=ghostty -e
layer=overlay
exit-on-keyboard-focus-loss=yes
icons-enabled=yes
icon-theme=Papirus-Dark
fields=name,generic,comment,categories,filename,keywords
width=35
lines=10
tabs=4

[colors]
background=1a1a1aff
text=c9c7cdff
match=7e9cd8ff
selection=252525ff
selection-text=c9c7cdff
selection-match=7e9cd8ff
border=7e9cd8ff

[border]
width=2
radius=4

[dmenu]
exit-immediately-if-empty=yes
