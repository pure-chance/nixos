palette = 'catppuccin_mocha'

format = """
$directory${custom.jj}$python$character
"""
add_newline = false

[username]
disabled = true

[hostname]
disabled = true

[directory]
truncation_length = 2
style = 'bold blue'

[character]
success_symbol = '[>](bold green)'
error_symbol = '[>](bold red)'

[custom.jj]
# ignore_timeout = true
description = 'jj status'
detect_folders = ['.jj']
command = 'jj log --revisions @ --no-graph --ignore-working-copy --color never --limit 1 --template "change_id.shortest()"' # or template prompt
format = '[(\($output\)) ]($style)'
style = "bold black"

# untracked = '[?]'
# staged = '[+]'
# modified = '[!]'
# renamed = '[»]'
# deleted = '[-]'
# stashed = '[$]'
# behind = '[•|]'
# ahead = '[|•]'
# conflicted = '[=]'
# diverged = '[~]'

[python]
# NOTE: space after is to add space between (.venv) & `symbol`
format = '[(\($virtualenv\) )](italic black)'

